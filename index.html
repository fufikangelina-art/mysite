<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Система перевірки</title>

<style>
body{
font-family: Arial;
background:#f3f6f9;
text-align:center;
padding:40px;
}

.box{
background:white;
padding:30px;
border-radius:10px;
max-width:500px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
font-size:16px;
margin-top:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
}

.check{
background:#0b3d6e;
color:white;
}

.clear{
background:#ccc;
}

#loading{
display:none;
margin-top:20px;
}

#result{
margin-top:20px;
font-size:18px;
}
</style>
</head>

<body>

<div class="box">

<h2>Система перевірки</h2>
<p>Введіть ПІБ для перевірки</p>

<input id="name" placeholder="Введіть ПІБ">

<button class="check" onclick="check()">Перевірити</button>
<button class="clear" onclick="clearData()">Очистити</button>

<div id="loading">⏳ Перевірка... зачекайте</div>
<div id="result"></div>

</div>

<script>

function check(){

let name=document.getElementById("name").value;

if(name==""){
alert("Введіть ПІБ");
return;
}

document.getElementById("loading").style.display="block";
document.getElementById("result").innerHTML="";

setTimeout(function(){

document.getElementById("loading").style.display="none";

let random=Math.random();

if(random>0.5){
document.getElementById("result").innerHTML="✅ Записів не знайдено";
}else{
document.getElementById("result").innerHTML="⚠️ Є збіг у тестовій базі";
}

},10000);

}

function clearData(){
document.getElementById("name").value="";
document.getElementById("result").innerHTML="";
document.getElementById("loading").style.display="none";
}

</script>

</body>
</html>
