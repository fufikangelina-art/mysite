
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Система перевірки</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f4f7;
}

.header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.box{
background:white;
padding:30px;
border-radius:10px;
max-width:450px;
margin:60px auto;
box-shadow:0 0 10px rgba(0,0,0,0.15);
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:15px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
}

.check{
background:#0b3d6e;
color:white;
}

.clear{
background:#ccc;
}

#loading{
display:none;
margin-top:20px;
font-size:16px;
}

#result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">
Система перевірки
</div>

<div class="box">

<p>Введіть ПІБ для перевірки</p>

<input id="name" placeholder="Введіть ПІБ">

<button class="check" onclick="check()">Перевірити</button>
<button class="clear" onclick="clearData()">Очистити</button>

<div id="loading">⏳ Перевірка... зачекайте</div>

<div id="result"></div>

</div>

<script>

function check(){

let name=document.getElementById("name").value;

if(name==""){
alert("Введіть ПІБ");
return;
}

document.getElementById("loading").style.display="block";
document.getElementById("result").innerHTML="";

setTimeout(function(){

document.getElementById("loading").style.display="none";

let random=Math.random();

if(random>0.5){
document.getElementById("result").innerHTML="<span style='color:green'>🟢 НЕ В БАЗІ</span>";
}else{
document.getElementById("result").innerHTML="<span style='color:red'>🔴 Є ЗБІГ У БАЗІ</span>";
}

},10000);

}

function clearData(){

document.getElementById("name").value="";
document.getElementById("result").innerHTML="";
document.getElementById("loading").style.display="none";

}

</script>

</body>
</html>
