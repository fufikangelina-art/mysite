
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>УХИЛЯНТИ-СЗЧ</title>

<style>державних реєстрів України.

body{
margin:0;
font-family:Arial;
background:#f2f4f7;
}

.header{
background:#1b5e20;
color:white;
text-align:center;
padding:25px;
}

.header h1{
margin:0;
font-size:28px;
letter-spacing:2px;
}

.header p{
margin-top:5px;
font-size:14px;
opacity:0.9;
}

.box{
background:white;
padding:25px;
max-width:500px;
margin:40px auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.15);
text-align:center;
}

input{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:10px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;
}

.check{
background:#0b3d6e;
color:white;
}

.clear{
background:#ccc;
}

#loading{
display:none;
margin-top:15px;
}

#result{
margin-top:15px;
font-size:20px;
font-weight:bold;
}

.history{
max-width:600px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.history h3{
margin-top:0;
}

.row{
padding:10px;
margin-top:5px;
border-radius:6px;
}

.green{
background:#e8f5e9;
color:#2e7d32;
}

.red{
background:#ffebee;
color:#c62828;
}

</style>
</head>

<body>

<div class="header">
<h1>ПЕРЕВІРКА СТАТУСУ</h1>
<p>система перевірки записів</p>
</div>

<div class="box">

<input id="name" placeholder="Введіть ПІБ">

<button class="check" onclick="check()">Перевірити</button>
<button class="clear" onclick="clearData()">Очистити</button>

<div id="loading">⏳ Перевірка...</div>

<div id="result"></div>

</div>

<div class="history">

<h3>Історія перевірок</h3>

<div id="historyList"></div>

</div>

<script>

function check(){

let name=document.getElementById("name").value;

if(name==""){
alert("Введіть ПІБ");
return;
}

document.getElementById("loading").style.display="block";
document.getElementById("result").innerHTML="";

setTimeout(function(){

document.getElementById("loading").style.display="none";

let random=Math.random();

let status;
let color;

if(random>0.5){
status="✅ НЕ В РОЗШУКУ";
color="green";
}else{
status=" ⛔ В РОЗШУКУ";
color="red";
}

document.getElementById("result").innerHTML=status;

let row=document.createElement("div");
row.className="row "+color;
row.innerText=name+" — "+status;

document.getElementById("historyList").prepend(row);

},4000);

}

function clearData(){

document.getElementById("name").value="";
document.getElementById("result").innerHTML="";
document.getElementById("loading").style.display="none";

}

</script>

</body>
</html>
