
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Перевірка реєстрів</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
margin:0;
}

.header{
background:#2e5b2e;
color:white;
text-align:center;
padding:20px;
}

.header img{
width:80px;
display:block;
margin:0 auto 10px;
}

.box{
background:white;
width:620px;
margin:40px auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:90%;
padding:10px;
margin-bottom:10px;
font-size:16px;
}

button{
width:95%;
padding:10px;
margin:5px;
font-size:16px;
cursor:pointer;
}

.check{
background:#2d4a7c;
color:white;
border:none;
}

.clear{
background:#ccc;
border:none;
}

.green{
background:#e8f5e9;
color:#2e7d32;
padding:10px;
margin-top:10px;
border-radius:6px;
}

.red{
background:#ffebee;
color:#c62828;
padding:10px;
margin-top:10px;
border-radius:6px;
}

.history{
width:620px;
margin:20px auto;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<div class="head"
<img src="gerb2.jpeg" width="80">
<h1>РОЗШУК УХИЛЯНТИ-СЗЧ</h1>
<p>система перевірки державних реєстрів України</p>

</div>

<div class="box">

<input id="name" placeholder="Введіть ПІБ">

<button class="check" onclick="check()">Перевірити</button>
<button class="clear" onclick="clearData()">Очистити</button>

<div id="loading" style="display:none;">⏳ Перевірка реєстрів України...</div>

<div id="result"></div>

</div>

<div class="history">

<h3>Історія перевірок</h3>
<div id="historyList"></div>

</div>

<script>

function check(){

let name=document.getElementById("name").value;

if(name==""){
alert("Введіть ПІБ");
return;
}

document.getElementById("loading").style.display="block";
document.getElementById("result").innerHTML="";

setTimeout(function(){

document.getElementById("loading").style.display="none";

let found=Math.random()>0.5;

let resultText="";
let className="";

if(found){
resultText="⛔В РОЗШУКУ";
className="red";
}else{
resultText="✅ НЕ В РОЗШУКУ";
className="green";
}

document.getElementById("result").innerHTML="<div class='"+className+"'>"+resultText+"</div>";

let history=document.getElementById("historyList");
history.innerHTML="<div class='"+className+"'>"+name+" — "+resultText+"</div>"+history.innerHTML;

},3000);

}

function clearData(){
document.getElementById("name").value="";
document.getElementById("result").innerHTML="";
}

</script>

</body>
</html>
