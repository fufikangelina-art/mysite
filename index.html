<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Рулетка</title>
<style>
  body {
    background: #0b1e2d;
    color: white;
    text-align: center;
    font-family: Arial;
  }

  .wheel {
    margin: 50px auto;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    border: 8px solid white;
    position: relative;
    overflow: hidden;
    transition: transform 4s ease-out;
  }

  .segment {
    position: absolute;
    width: 50%;
    height: 50%;
    transform-origin: 100% 100%;
  }

  .blue { background: #3498db; }
  .orange { background: orange; }
  .red { background: red; }

  button {
    padding: 15px 30px;
    font-size: 20px;
    background: gold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }

  .arrow {
    width: 0;
    height: 0;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-bottom: 30px solid white;
    margin: auto;
  }
</style>
</head>

<body>

<h1>🎰 Рулетка</h1>

<div class="arrow"></div>

<div id="wheel" class="wheel"></div>

<br>
<button onclick="spin()">КРУТИТИ</button>

<h2 id="result"></h2>

<script>
const wheel = document.getElementById("wheel");

// створюємо сегменти
const colors = ["blue","orange","red","blue","orange","red"];
const prizes = ["0 грн","10 грн","100 грн","0 грн","20 грн","200 грн"];

for (let i = 0; i < 6; i++) {
  let segment = document.createElement("div");
  segment.className = "segment " + colors[i];
  segment.style.transform = `rotate(${i * 60}deg) skewY(-30deg)`;
  wheel.appendChild(segment);
}

let rotation = 0;

function spin() {
  let random = Math.floor(Math.random() * 360) + 720;
  rotation += random;
  wheel.style.transform = `rotate(${rotation}deg)`;

  let index = Math.floor((360 - (rotation % 360)) / 60) % 6;

  setTimeout(() => {
    document.getElementById("result").innerText =
      "Ти виграв: " + prizes[index];
  }, 4000);
}
</script>

</body>
</html>
