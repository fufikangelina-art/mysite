<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Casino Wheel</title>

<style>
body {
  margin: 0;
  background: #0c1b2a;
  color: white;
  font-family: Arial;
  text-align: center;
}

/* колесо */
.wheel {
  width: 320px;
  height: 320px;
  border-radius: 50%;
  border: 6px solid #aaa;
  margin: 30px auto;
  position: relative;
  overflow: hidden;
  transition: transform 4s cubic-bezier(0.2, 0.8, 0.2, 1);
}

/* сегменти */
.segment {
  position: absolute;
  width: 50%;
  height: 50%;
  transform-origin: 100% 100%;
}

.blue { background: #3498db; }
.orange { background: #f39c12; }
.red { background: #e74c3c; }

/* стрілка */
.arrow {
  width: 0;
  height: 0;
  margin: auto;
  border-left: 15px solid transparent;
  border-right: 15px solid transparent;
  border-bottom: 25px solid white;
}

/* кнопки */
.controls {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.bet {
  padding: 15px;
  width: 100px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.blueBtn { background: #3498db; }
.orangeBtn { background: #f39c12; }
.redBtn { background: #e74c3c; }

.spin {
  margin-top: 15px;
  padding: 15px 30px;
  background: gold;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
}

/* текст */
#result {
  margin-top: 15px;
  font-size: 22px;
}

.players {
  margin-top: 20px;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<h2>🎰 LIVE GAME</h2>

<div class="arrow"></div>
<div id="wheel" class="wheel"></div>

<div class="controls">
  <div class="bet blueBtn" onclick="setBet('blue')">🔵 x2</div>
  <div class="bet orangeBtn" onclick="setBet('orange')">🟠 x5</div>
  <div class="bet redBtn" onclick="setBet('red')">🔴 x10</div>
</div>

<button class="spin" onclick="spin()">КРУТИТИ</button>

<div id="result"></div>

<div class="players" id="players"></div>

<script>
const wheel = document.getElementById("wheel");

const segments = [
  "blue","orange","blue","red",
  "blue","orange","blue","red"
];

for (let i = 0; i < segments.length; i++) {
  let s = document.createElement("div");
  s.className = "segment " + segments[i];
  s.style.transform = `rotate(${i * (360/segments.length)}deg) skewY(-45deg)`;
  wheel.appendChild(s);
}

let rotation = 0;
let currentBet = "blue";

// ставки
function setBet(color) {
  currentBet = color;
  document.getElementById("result").innerText = "Ставка: " + color;
}

// крутка
function spin() {
  let random = Math.floor(Math.random() * 360) + 720;
  rotation += random;
  wheel.style.transform = `rotate(${rotation}deg)`;

  let index = Math.floor((360 - (rotation % 360)) / (360/segments.length)) % segments.length;
  let result = segments[index];

  setTimeout(() => {
    if (result === currentBet) {
      let win = result === "red" ? "x10" : result === "orange" ? "x5" : "x2";
      document.getElementById("result").innerText = "🔥 ВИГРАВ " + win;
    } else {
      document.getElementById("result").innerText = "❌ ПРОГРАВ";
    }

    fakePlayers();
  }, 4000);
}

// фейкові гравці (як у казино)
function fakePlayers() {
  let names = ["Roma","Max","Ivan","Alex","Den","TopG","Boss"];
  let text = "";

  for (let i = 0; i < 5; i++) {
    let name = names[Math.floor(Math.random()*names.length)];
    let amount = Math.floor(Math.random()*200);
    text += name + " виграв " + amount + " грн<br>";
  }

  document.getElementById("players").innerHTML = text;
}
</script>

</body>
</html>
